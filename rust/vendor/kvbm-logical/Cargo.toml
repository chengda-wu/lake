# Vendored from ai-dynamo/dynamo (lib/kvbm-logical) for lake P4 KV Pool.
# SPDX-FileCopyrightText: Copyright (c) 2025-2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved.
# SPDX-License-Identifier: Apache-2.0
# 许可全文见本目录 LICENSE；上游 pin 见 ../UPSTREAM.md。
#
# P4.1 仅构建接入(业务源码未改):
#   - workspace = true 填实版本(lake 不嵌套 dynamo workspace)
#   - dynamo-tokens 改 path 依赖指向同 vendor 目录
#   - edition = "2024"(上游 let chains)
# 源码改造(InactiveIndex pub / 拆 EventsManager / G1-G4→L0-L3 等)见 #20 后续切片。

[package]
name = "kvbm-logical"
version = "1.3.0"
edition = "2024"
authors = ["NVIDIA"]
license = "Apache-2.0"
repository = "https://github.com/ai-dynamo/dynamo"

[dependencies]
dynamo-tokens = { path = "../dynamo-tokens" }

anyhow = "1"
async-stream = "0.3"
# 上游 crate 局部覆盖 workspace 根 1.9 → 1.10；semver 仍解析到 lock 同版本。
bytes = "1.10"
bincode = { version = "2.0.1", features = ["serde", "derive"] }
derive_builder = "0.20"
futures = "0.3"
indexmap = "2"
lru = "0.16"
parking_lot = "0.12.5"
prometheus = "0.14"
rmp-serde = "1"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
thiserror = "2.0.17"
# 对齐 lake workspace 风格(version "1" + 显式 features);较上游 =1.48.0+full 放松。
# 显式含 sync/time,不依赖 tokio-stream 间接补齐(见 ../UPSTREAM.md)。
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal", "sync", "time"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tracing = "0.1"
xxhash-rust = { version = "0.8", features = ["xxh3", "const_xxh3"] }

[features]
testing = []

[dev-dependencies]
criterion = "0.5"
proptest = "1.5.0"
rand = "0.9.2"
rand_chacha = "0.9"
rstest = "0.26"
serde_json = "1"
tokio = { version = "1", features = ["full"] }
# tracing-mutex 包装 parking_lot 原语,构建运行期锁获取 DAG,遇序反转/环即 panic。
# 仅 #[cfg(test)] 用(每次获取的全局 DAG 代价在生产热路径不可接受)。
tracing-mutex = { version = "0.3", features = ["parking_lot"] }
# 上游经 workspace 继承 tracing-subscriber 0.3,但源码/测例均未引用——死依赖,vendor 不带。

# match_blocks / acquire 热路径 criterion benchmark。需 testing feature(src/testing/ helpers)。
[[bench]]
name = "block_manager"
harness = false
required-features = ["testing"]
