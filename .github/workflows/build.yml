# 三语言空壳编译/生成验证(见 PR #17 review follow-up:加 CI 防 drift)。
# Rust workspace 编译(tonic 在线生成 stub);Go module 编译;Python stub + worker 包 import。
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # tonic-build(build.rs)调 protoc 在线生成 stub,CI 需装 protoc。
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo build --workspace

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - run: go build ./...

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # stub 顶部校验 protobuf runtime ≥ 7.35.0 / grpcio ≥ 1.82.1(见 setup.py)。
      - run: pip install -e .
      - run: python -c "from lake_pb import lake_pb2, lake_pb2_grpc, schema_pb2; import prefill, decode, draft, kernels, runtime; print('py OK')"
